<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}MyTV{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="{{ url_for('dashboard') }}">📺 MyTV</a>
    <nav>
      <a href="{{ url_for('dashboard') }}" class="{{ 'on' if active=='dashboard' }}">Dashboard</a>
      <a href="{{ url_for('library') }}" class="{{ 'on' if active=='library' }}">Shows</a>
      <a href="{{ url_for('movies') }}"  class="{{ 'on' if active=='movies' }}">Movies</a>
      <a href="{{ url_for('discover') }}" class="{{ 'on' if active=='discover' }}">Discover</a>
      <a href="{{ url_for('stats') }}"   class="{{ 'on' if active=='stats' }}">Stats</a>
      <a href="{{ url_for('settings') }}" class="{{ 'on' if active=='settings' }}">Settings</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
